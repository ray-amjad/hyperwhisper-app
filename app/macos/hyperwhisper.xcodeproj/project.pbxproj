			shellScript = "set -e\nRUNTIME_SRC=\"$SRCROOT/hyperwhisper/Runtime\"\nRUNTIME_DST=\"$TARGET_BUILD_DIR/$UNLOCALIZED_RESOURCES_FOLDER_PATH/Runtime\"\nif [ -d \"$RUNTIME_SRC\" ]; then\n  /bin/mkdir -p \"$RUNTIME_DST\"\n  /usr/bin/ditto \"$RUNTIME_SRC\" \"$RUNTIME_DST\"\n\n  echo \"Normalizing runtime loader paths\"\n  find \"$RUNTIME_DST\" -type f \\( -name \"llama-server\" -o -name \"*.dylib\" \\) | while read -r binary; do\n    /usr/bin/otool -l \"$binary\" | \\\n      /usr/bin/awk '/cmd LC_RPATH/ { getline; getline; if ($1 == \"path\") print $2 }' | \\\n      while read -r rpath; do\n        case \"$rpath\" in\n          @*) ;;\n          *) /usr/bin/install_name_tool -delete_rpath \"$rpath\" \"$binary\" || true ;;\n        esac\n      done\n    if ! /usr/bin/otool -l \"$binary\" | /usr/bin/grep -q \"@loader_path\"; then\n      /usr/bin/install_name_tool -add_rpath \"@loader_path\" \"$binary\"\n    fi\n  done\nfi\n";
